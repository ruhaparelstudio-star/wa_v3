x-app-environment: &app-environment
  APP_NAME: "WA V3"
  APP_ENV: local
  APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080
  LOG_CHANNEL: stderr
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: wa_v3
  DB_USERNAME: wa_v3
  DB_PASSWORD: secret
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: file
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  LLM_PROVIDER: openai
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_MODEL: gpt-5.3
  OPENAI_TIMEOUT_SECONDS: 10
  OPENAI_TEMPERATURE: 0
  OPENAI_MAX_OUTPUT_TOKENS: 500
  SUPERADMIN_NAME: "Super Admin"
  SUPERADMIN_EMAIL: superadmin@wa-v3.local
  SUPERADMIN_PASSWORD: ChangeMe!2026

x-app-build: &app-build
  context: .
  dockerfile: docker/php/Dockerfile

services:
  app:
    build: *app-build
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wa_v3
      MYSQL_USER: wa_v3
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  queue:
    build: *app-build
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=60
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: *app-build
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
